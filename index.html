<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tools &amp; Resources</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      max-width: 1200px;
      margin: 0 auto 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
    }

    /* Toggle switch */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.875rem;
      color: #8b949e;
    }

    .toggle-wrap span {
      cursor: pointer;
      transition: color 0.2s;
    }

    .toggle-wrap span.active {
      color: #58a6ff;
      font-weight: 600;
    }

    .switch {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .switch input { display: none; }

    .slider {
      position: absolute;
      inset: 0;
      background: #30363d;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      bottom: 3px;
      background: #e1e4e8;
      border-radius: 50%;
      transition: transform 0.3s;
    }

    .switch input:checked + .slider {
      background: #58a6ff;
    }

    .switch input:checked + .slider::before {
      transform: translateX(20px);
    }

    /* Content area */
    #content {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Category heading */
    .category-heading {
      font-size: 1.25rem;
      font-weight: 600;
      color: #58a6ff;
      margin: 2rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #21262d;
    }

    .category-heading:first-child {
      margin-top: 0;
    }

    /* Card grid */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      min-height: 40px;
      padding: 4px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .card-grid.drag-over {
      background: rgba(88, 166, 255, 0.05);
      outline: 2px dashed rgba(88, 166, 255, 0.3);
      outline-offset: 4px;
    }

    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 1.25rem;
      transition: border-color 0.2s, transform 0.15s, opacity 0.2s;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      cursor: grab;
    }

    .card:active { cursor: grabbing; }

    .card:hover {
      border-color: #58a6ff;
      transform: translateY(-2px);
    }

    .card.dragging {
      opacity: 0.3;
      transform: scale(0.95);
    }

    .card.drag-placeholder {
      border: 2px dashed #58a6ff;
      background: rgba(88, 166, 255, 0.08);
      min-height: 100px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
    }

    .card-title a {
      color: inherit;
      text-decoration: none;
    }

    .card-title a:hover {
      text-decoration: underline;
    }

    .card-category {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.2em 0.6em;
      border-radius: 4px;
      width: fit-content;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .card-description {
      font-size: 0.85rem;
      color: #8b949e;
      line-height: 1.5;
    }

    .btn-edit {
      background: none;
      border: none;
      color: #484f58;
      cursor: pointer;
      padding: 0.2rem;
      font-size: 0.8rem;
      line-height: 1;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .btn-edit:hover {
      color: #58a6ff;
      background: rgba(88, 166, 255, 0.1);
    }

    /* Category badge colors */
    .cat-hosting     { background: #1a2a3a; color: #58a6ff; }
    .cat-ecommerce   { background: #1a3a2a; color: #3fb950; }
    .cat-app         { background: #2a1a3a; color: #bc8cff; }
    .cat-ai          { background: #2a2a1a; color: #d2a8ff; }
    .cat-devtools    { background: #3a2a1a; color: #f0883e; }
    .cat-design      { background: #3a3a1a; color: #e3b341; }
    .cat-placeholder { background: #2a2a2a; color: #8b949e; }
    .cat-information { background: #1a2a2a; color: #39d353; }

    /* Information card content */
    .card-content-preview {
      font-size: 0.8rem;
      color: #8b949e;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      white-space: pre-wrap;
    }

    .card.info-card {
      cursor: pointer;
    }

    .card.info-card:hover .card-content-preview {
      color: #b1bac4;
    }

    /* Detail overlay for viewing full information */
    .detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    .detail-overlay.open {
      display: flex;
    }

    .detail-panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 640px;
      max-height: 80vh;
      margin: 1rem;
      display: flex;
      flex-direction: column;
    }

    .detail-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
      gap: 1rem;
    }

    .detail-panel-header h2 {
      font-size: 1.25rem;
      color: #fff;
      margin: 0;
    }

    .detail-panel-header .btn-close {
      background: none;
      border: none;
      color: #8b949e;
      font-size: 1.25rem;
      cursor: pointer;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .detail-panel-header .btn-close:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
    }

    .detail-panel-body {
      overflow-y: auto;
      white-space: pre-wrap;
      font-size: 0.875rem;
      color: #e1e4e8;
      line-height: 1.7;
    }

    /* New button */
    .btn-new {
      background: #238636;
      color: #fff;
      border: 1px solid #2ea043;
      border-radius: 6px;
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-new:hover {
      background: #2ea043;
    }

    /* Modal overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 480px;
      margin: 1rem;
    }

    .modal h2 {
      font-size: 1.25rem;
      color: #fff;
      margin-bottom: 1rem;
    }

    .modal label {
      display: block;
      font-size: 0.8rem;
      color: #8b949e;
      margin-bottom: 0.25rem;
    }

    .modal input,
    .modal select,
    .modal textarea {
      width: 100%;
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.75rem;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e1e4e8;
      font-size: 0.875rem;
      font-family: inherit;
    }

    .modal input:focus,
    .modal select:focus,
    .modal textarea:focus {
      outline: none;
      border-color: #58a6ff;
    }

    .modal textarea {
      resize: vertical;
      min-height: 60px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .modal-actions button {
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid #30363d;
    }

    .btn-cancel {
      background: #21262d;
      color: #e1e4e8;
    }

    .btn-cancel:hover {
      background: #30363d;
    }

    .btn-save {
      background: #238636;
      color: #fff;
      border-color: #2ea043;
    }

    .btn-save:hover {
      background: #2ea043;
    }

    @media (max-width: 600px) {
      body { padding: 1rem; }
      header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Tools &amp; Resources</h1>
    <div class="toggle-wrap">
      <span id="label-category" class="active">Category</span>
      <label class="switch">
        <input type="checkbox" id="viewToggle">
        <span class="slider"></span>
      </label>
      <span id="label-alpha">A &ndash; Z</span>
      <button class="btn-new" id="btnNew">+ New</button>
    </div>
  </header>

  <div id="content"></div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitle">Add New Tool</h2>
      <label for="newType">Type</label>
      <select id="newType">
        <option value="tool">Tool (link)</option>
        <option value="info">Information (text)</option>
      </select>
      <label for="newName">Name</label>
      <input type="text" id="newName" placeholder="e.g. My Tool">
      <div id="urlField">
        <label for="newUrl">URL</label>
        <input type="url" id="newUrl" placeholder="https://example.com">
      </div>
      <label for="newCategory">Category</label>
      <select id="newCategory"></select>
      <input type="text" id="newCategoryInput" placeholder="Enter new category name" style="display:none">
      <div id="descriptionField">
        <label for="newDescription">Description</label>
        <textarea id="newDescription" placeholder="Brief description of the tool."></textarea>
      </div>
      <div id="contentField" style="display:none">
        <label for="newContent">Content</label>
        <textarea id="newContent" placeholder="Paste or type your information here..." style="min-height:160px"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="btnCancel">Cancel</button>
        <button class="btn-save" id="btnSave">Add Tool</button>
      </div>
    </div>
  </div>

  <div class="detail-overlay" id="detailOverlay">
    <div class="detail-panel">
      <div class="detail-panel-header">
        <h2 id="detailTitle"></h2>
        <button class="btn-close" id="detailClose">&times;</button>
      </div>
      <div class="detail-panel-body" id="detailBody"></div>
    </div>
  </div>

  <script>
    // ── Default Tool Data ──
    const defaultTools = [
      // Hosting
      { name: "Namecheap", url: "https://www.namecheap.com", category: "Hosting", description: "Domain registration and management." },
      { name: "Railway", url: "https://www.railway.ai", category: "Hosting", description: "Deploy apps and databases to the cloud instantly." },
      { name: "Firebase", url: "https://firebase.google.com/", category: "Hosting", description: "Google's app development platform with hosting, auth, and database." },
      { name: "Vercel", url: "https://www.vercel.com", category: "Hosting", description: "Frontend cloud platform for deploying web apps." },

      // E-Commerce
      { name: "menopausemugs.com on Etsy", url: "https://www.etsy.com/shop/MenopauseMugs", category: "E-Commerce", description: "Etsy storefront for MenopauseMugs." },
      { name: "Printify", url: "https://www.printify.com", category: "E-Commerce", description: "Print-on-demand product creation and fulfillment." },
      { name: "menopausemugs.com Admin", url: "https://menopausemugs.com/store/wp-admin", category: "E-Commerce", description: "WordPress admin panel for the MenopauseMugs store." },
      { name: "menopausemugs.com", url: "https://www.menopausemugs.com", category: "E-Commerce", description: "MenopauseMugs storefront." },

      // App
      { name: "Evertides", url: "https://www.evertides.co", category: "App", description: "Contextual application by Evertides." },
      { name: "Palamed Admin", url: "https://www.palamed.co/#admin", category: "App", description: "Admin dashboard for Palamed." },
      { name: "Palamed.co", url: "https://www.palamed.co", category: "App", description: "Palamed web application." },
      { name: "Toolbox", url: "https://toolbox-sooty-three.vercel.app/", category: "App", description: "This tools and resources dashboard." },
      { name: "Weighted Rankings", url: "https://weighted-rankings.vercel.app", category: "App", description: "Tool for weighted ranking and design testing." },

      // AI
      { name: "OpenAI", url: "https://www.openai.com", category: "AI", description: "AI research lab and API provider." },
      { name: "ChatGPT", url: "https://www.chatgpt.com", category: "AI", description: "Conversational AI assistant by OpenAI." },
      { name: "Claude", url: "https://www.claude.com", category: "AI", description: "Anthropic's AI assistant for analysis, writing, and code." },
      { name: "Claude AI", url: "https://www.claude.ai", category: "AI", description: "Direct access to Claude's chat interface." },

      // Dev Tools
      { name: "GitHub", url: "https://www.github.com", category: "Dev Tools", description: "Code hosting, version control, and collaboration." },
      { name: "Supabase", url: "https://www.supabase.com", category: "Dev Tools", description: "Open-source Firebase alternative with Postgres backend." },
      { name: "Resend", url: "https://www.resend.com", category: "Dev Tools", description: "Email API for developers." },

      // Design
      { name: "Stitch by Google", url: "https://stitch.withgoogle.com", category: "Design", description: "Build site design, UI/UX from code." },

      // ── Placeholder Apps for Review ──
      { name: "Burp Suite", url: "https://portswigger.net/burp", category: "Placeholder Apps for Review", description: "Web vulnerability scanner and proxy for penetration testing." },
      { name: "Nessus", url: "https://www.tenable.com/products/nessus", category: "Placeholder Apps for Review", description: "Comprehensive vulnerability assessment scanner." },
      { name: "1Password", url: "https://1password.com", category: "Placeholder Apps for Review", description: "Team password manager with secret sharing and audit logs." },
      { name: "CrowdStrike", url: "https://www.crowdstrike.com", category: "Placeholder Apps for Review", description: "Endpoint detection and response platform." },
      { name: "Netlify", url: "https://www.netlify.com", category: "Placeholder Apps for Review", description: "Build, deploy, and scale modern web projects." },
      { name: "AWS", url: "https://aws.amazon.com", category: "Placeholder Apps for Review", description: "Full-spectrum cloud computing services by Amazon." },
      { name: "DigitalOcean", url: "https://www.digitalocean.com", category: "Placeholder Apps for Review", description: "Simple cloud infrastructure for developers." },
      { name: "Notion", url: "https://www.notion.so", category: "Placeholder Apps for Review", description: "All-in-one workspace for notes, docs, and project management." },
      { name: "Slack", url: "https://slack.com", category: "Placeholder Apps for Review", description: "Team messaging and collaboration hub." },
      { name: "Figma", url: "https://www.figma.com", category: "Placeholder Apps for Review", description: "Collaborative interface design tool in the browser." },
      { name: "Linear", url: "https://linear.app", category: "Placeholder Apps for Review", description: "Streamlined issue tracking for software teams." },
      { name: "GitHub Actions", url: "https://github.com/features/actions", category: "Placeholder Apps for Review", description: "CI/CD workflows built into GitHub repositories." },
      { name: "Docker", url: "https://www.docker.com", category: "Placeholder Apps for Review", description: "Containerization platform for building and shipping apps." },
      { name: "Terraform", url: "https://www.terraform.io", category: "Placeholder Apps for Review", description: "Infrastructure as code for provisioning cloud resources." },
      { name: "Ansible", url: "https://www.ansible.com", category: "Placeholder Apps for Review", description: "Agentless automation for configuration management." },
      { name: "Datadog", url: "https://www.datadoghq.com", category: "Placeholder Apps for Review", description: "Cloud-scale monitoring and observability platform." },
      { name: "Grafana", url: "https://grafana.com", category: "Placeholder Apps for Review", description: "Open-source dashboards for metrics and logs visualization." },
      { name: "PagerDuty", url: "https://www.pagerduty.com", category: "Placeholder Apps for Review", description: "Incident response and on-call management." },
      { name: "PostgreSQL", url: "https://www.postgresql.org", category: "Placeholder Apps for Review", description: "Powerful open-source relational database system." },
      { name: "Redis", url: "https://redis.io", category: "Placeholder Apps for Review", description: "In-memory data store for caching and real-time apps." },
      { name: "Hugging Face", url: "https://huggingface.co", category: "Placeholder Apps for Review", description: "Open-source ML model hub and collaboration platform." },
      { name: "Replicate", url: "https://replicate.com", category: "Placeholder Apps for Review", description: "Run open-source ML models via a simple API." },
      { name: "Coolors", url: "https://coolors.co", category: "Placeholder Apps for Review", description: "Fast color palette generator for designers." },
      { name: "Font Awesome", url: "https://fontawesome.com", category: "Placeholder Apps for Review", description: "Icon library and toolkit for web projects." },
      { name: "Unsplash", url: "https://unsplash.com", category: "Placeholder Apps for Review", description: "Free high-resolution photos for any project." },
    ];

    // ── Load tools from localStorage or use defaults ──
    let tools = loadTools();

    function loadTools() {
      try {
        const saved = localStorage.getItem("toolbox_order");
        if (saved) return JSON.parse(saved);
      } catch {}
      return defaultTools.map(t => ({ ...t }));
    }

    function saveTools() {
      localStorage.setItem("toolbox_order", JSON.stringify(tools));
    }

    // ── Category color map ──
    const catClass = {
      Hosting: "cat-hosting",
      "E-Commerce": "cat-ecommerce",
      App: "cat-app",
      AI: "cat-ai",
      "Dev Tools": "cat-devtools",
      Design: "cat-design",
      "Placeholder Apps for Review": "cat-placeholder",
      Information: "cat-information",
    };

    // ── Rendering ──
    const content = document.getElementById("content");
    const toggle = document.getElementById("viewToggle");
    const labelCat = document.getElementById("label-category");
    const labelAlpha = document.getElementById("label-alpha");

    let draggedIndex = null;

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function createCard(tool, index) {
      const isInfo = tool.type === "info";
      return `
        <div class="card${isInfo ? ' info-card' : ''}" draggable="true" data-index="${index}"${isInfo ? ' data-info="true"' : ''}>
          <div class="card-header">
            <span class="card-category ${catClass[tool.category] || ''}">${tool.category}</span>
            <button class="btn-edit" data-index="${index}" title="Edit">&#9998;</button>
          </div>
          <div class="card-title">${isInfo
            ? escapeHtml(tool.name)
            : `<a href="${tool.url}" target="_blank" rel="noopener" draggable="false">${escapeHtml(tool.name)}</a>`
          }</div>
          ${isInfo
            ? `<div class="card-content-preview">${escapeHtml(tool.content || '')}</div>`
            : `<div class="card-description">${escapeHtml(tool.description)}</div>`
          }
        </div>`;
    }

    function getToolsByCategory() {
      const categories = {};
      tools.forEach((t, i) => {
        if (!categories[t.category]) categories[t.category] = [];
        categories[t.category].push({ tool: t, index: i });
      });
      return categories;
    }

    function renderCategoryView() {
      const categories = getToolsByCategory();

      const sortedKeys = Object.keys(categories).sort((a, b) => {
        if (a === "Project") return -1;
        if (b === "Project") return 1;
        if (a === "Placeholder Apps for Review") return 1;
        if (b === "Placeholder Apps for Review") return -1;
        return a.localeCompare(b);
      });

      let html = "";
      sortedKeys.forEach(cat => {
        const sorted = categories[cat].sort((a, b) => a.tool.name.localeCompare(b.tool.name));
        html += `<h2 class="category-heading">${cat}</h2>`;
        html += `<div class="card-grid" data-category="${cat}">`;
        html += sorted.map(item => createCard(item.tool, item.index)).join("");
        html += `</div>`;
      });
      content.innerHTML = html;
      attachDragListeners();
    }

    function renderAlphaView() {
      const indexed = tools.map((t, i) => ({ tool: t, index: i }));
      indexed.sort((a, b) => a.tool.name.localeCompare(b.tool.name));
      content.innerHTML = `<div class="card-grid">${indexed.map(item => createCard(item.tool, item.index)).join("")}</div>`;
    }

    function render() {
      const isAlpha = toggle.checked;
      labelCat.classList.toggle("active", !isAlpha);
      labelAlpha.classList.toggle("active", isAlpha);
      if (isAlpha) {
        renderAlphaView();
      } else {
        renderCategoryView();
      }
    }

    toggle.addEventListener("change", render);

    // ── Drag and Drop ──
    function attachDragListeners() {
      const cards = content.querySelectorAll(".card[draggable]");
      const grids = content.querySelectorAll(".card-grid[data-category]");

      cards.forEach(card => {
        card.addEventListener("dragstart", onDragStart);
        card.addEventListener("dragend", onDragEnd);
      });

      grids.forEach(grid => {
        grid.addEventListener("dragover", onDragOver);
        grid.addEventListener("dragleave", onDragLeave);
        grid.addEventListener("drop", onDrop);
      });
    }

    function onDragStart(e) {
      draggedIndex = parseInt(e.currentTarget.dataset.index);
      e.currentTarget.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
      e.dataTransfer.setData("text/plain", draggedIndex);
    }

    function onDragEnd(e) {
      e.currentTarget.classList.remove("dragging");
      content.querySelectorAll(".card-grid").forEach(g => g.classList.remove("drag-over"));
      draggedIndex = null;
    }

    function onDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      e.currentTarget.classList.add("drag-over");
    }

    function onDragLeave(e) {
      if (!e.currentTarget.contains(e.relatedTarget)) {
        e.currentTarget.classList.remove("drag-over");
      }
    }

    function onDrop(e) {
      e.preventDefault();
      const grid = e.currentTarget;
      grid.classList.remove("drag-over");

      if (draggedIndex === null) return;

      const targetCategory = grid.dataset.category;
      const draggedTool = tools[draggedIndex];

      // Find insertion position based on mouse location
      const cards = [...grid.querySelectorAll(".card:not(.dragging)")];
      let insertBeforeIndex = null;

      for (const card of cards) {
        const rect = card.getBoundingClientRect();
        const midY = rect.top + rect.height / 2;
        const midX = rect.left + rect.width / 2;
        if (e.clientY < midY || (e.clientY < rect.bottom && e.clientX < midX)) {
          insertBeforeIndex = parseInt(card.dataset.index);
          break;
        }
      }

      // Remove the tool from its current position
      const [removed] = tools.splice(draggedIndex, 1);
      removed.category = targetCategory;

      // Recalculate insert position after removal
      if (insertBeforeIndex !== null) {
        // Adjust index since we removed an element
        let adjustedIndex = insertBeforeIndex;
        if (draggedIndex < insertBeforeIndex) adjustedIndex--;
        // Find where this tool now sits in the array
        const targetTool = tools[adjustedIndex];
        const newPos = targetTool ? tools.indexOf(targetTool) : tools.length;
        tools.splice(newPos, 0, removed);
      } else {
        // Dropped at the end of the category — find last tool in this category
        let lastCatIndex = -1;
        tools.forEach((t, i) => {
          if (t.category === targetCategory) lastCatIndex = i;
        });
        tools.splice(lastCatIndex + 1, 0, removed);
      }

      // Update badge color class
      saveTools();
      render();
    }

    // ── Tool Modal (Add / Edit) ──
    const modalOverlay = document.getElementById("modalOverlay");
    const modalTitle = document.getElementById("modalTitle");
    const btnNew = document.getElementById("btnNew");
    const btnCancel = document.getElementById("btnCancel");
    const btnSave = document.getElementById("btnSave");
    const newType = document.getElementById("newType");
    const newName = document.getElementById("newName");
    const newUrl = document.getElementById("newUrl");
    const urlField = document.getElementById("urlField");
    const newCategory = document.getElementById("newCategory");
    const newDescription = document.getElementById("newDescription");
    const descriptionField = document.getElementById("descriptionField");
    const newContent = document.getElementById("newContent");
    const contentField = document.getElementById("contentField");

    let editingIndex = null;
    const newCategoryInput = document.getElementById("newCategoryInput");

    // Detail overlay elements
    const detailOverlay = document.getElementById("detailOverlay");
    const detailTitle = document.getElementById("detailTitle");
    const detailBody = document.getElementById("detailBody");
    const detailClose = document.getElementById("detailClose");

    function toggleModalType() {
      const isInfo = newType.value === "info";
      urlField.style.display = isInfo ? "none" : "";
      descriptionField.style.display = isInfo ? "none" : "";
      contentField.style.display = isInfo ? "" : "none";
    }

    newType.addEventListener("change", toggleModalType);

    function populateCategories(selected) {
      const cats = [...new Set(tools.map(t => t.category))].sort((a, b) => {
        if (a === "Placeholder Apps for Review") return 1;
        if (b === "Placeholder Apps for Review") return -1;
        return a.localeCompare(b);
      });
      newCategory.innerHTML = cats.map(c =>
        `<option value="${c}"${c === selected ? " selected" : ""}>${c}</option>`
      ).join("") + `<option value="__new__">+ New category...</option>`;
      newCategoryInput.style.display = "none";
      newCategoryInput.value = "";
    }

    newCategory.addEventListener("change", () => {
      if (newCategory.value === "__new__") {
        newCategoryInput.style.display = "";
        newCategoryInput.focus();
      } else {
        newCategoryInput.style.display = "none";
        newCategoryInput.value = "";
      }
    });

    function openModal(index) {
      editingIndex = index !== undefined ? index : null;
      if (editingIndex !== null) {
        const tool = tools[editingIndex];
        modalTitle.textContent = tool.type === "info" ? "Edit Information" : "Edit Tool";
        btnSave.textContent = "Save Changes";
        newType.value = tool.type || "tool";
        newName.value = tool.name;
        newUrl.value = tool.url || "";
        newDescription.value = tool.description || "";
        newContent.value = tool.content || "";
        populateCategories(tool.category);
      } else {
        modalTitle.textContent = "Add New Entry";
        btnSave.textContent = "Add Entry";
        newType.value = "tool";
        newName.value = "";
        newUrl.value = "";
        newDescription.value = "";
        newContent.value = "";
        populateCategories();
      }
      toggleModalType();
      newName.style.borderColor = "";
      newUrl.style.borderColor = "";
      modalOverlay.classList.add("open");
      newName.focus();
    }

    function closeModal() {
      modalOverlay.classList.remove("open");
      editingIndex = null;
    }

    btnNew.addEventListener("click", () => openModal());
    btnCancel.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e) => {
      if (e.target === modalOverlay) closeModal();
    });

    content.addEventListener("click", (e) => {
      const btn = e.target.closest(".btn-edit");
      if (btn) {
        e.preventDefault();
        e.stopPropagation();
        openModal(parseInt(btn.dataset.index));
        return;
      }

      const infoCard = e.target.closest(".info-card");
      if (infoCard) {
        e.preventDefault();
        const idx = parseInt(infoCard.dataset.index);
        const tool = tools[idx];
        detailTitle.textContent = tool.name;
        detailBody.textContent = tool.content || "(No content)";
        detailOverlay.classList.add("open");
      }
    });

    detailClose.addEventListener("click", () => detailOverlay.classList.remove("open"));
    detailOverlay.addEventListener("click", (e) => {
      if (e.target === detailOverlay) detailOverlay.classList.remove("open");
    });

    btnSave.addEventListener("click", () => {
      const type = newType.value;
      const name = newName.value.trim();
      const isInfo = type === "info";

      let category = newCategory.value;
      if (category === "__new__") {
        category = newCategoryInput.value.trim();
        if (!category) {
          newCategoryInput.style.borderColor = "#f85149";
          return;
        }
        newCategoryInput.style.borderColor = "";
      }

      if (isInfo) {
        const contentVal = newContent.value.trim();
        if (!name) {
          newName.style.borderColor = "#f85149";
          return;
        }
        newName.style.borderColor = "";

        if (!catClass[category]) catClass[category] = "cat-placeholder";

        const entry = { name, type: "info", category, content: contentVal };
        if (editingIndex !== null) {
          tools[editingIndex] = entry;
        } else {
          tools.push(entry);
        }
      } else {
        const url = newUrl.value.trim();
        const description = newDescription.value.trim();
        if (!name || !url) {
          newName.style.borderColor = name ? "" : "#f85149";
          newUrl.style.borderColor = url ? "" : "#f85149";
          return;
        }

        if (!catClass[category]) catClass[category] = "cat-placeholder";

        const entry = { name, url, category, description };
        if (editingIndex !== null) {
          tools[editingIndex] = entry;
        } else {
          tools.push(entry);
        }
      }

      saveTools();
      closeModal();
      render();
    });

    // Default: category view
    render();
  </script>
</body>
</html>
